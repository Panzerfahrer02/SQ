<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidequest Simulator</title>
  <link rel="stylesheet" href="design.css" />
</head>
<body>
  <main class="container">
    <header class="hero-card">
      <div>
        <p class="eyebrow">GUILD BOARD</p>
        <h1>Sidequest Simulator</h1>
      </div>
      <button id="clearAllBtn" type="button" class="secondary-btn">Speicher leeren</button>
    </header>

    <section class="top-grid">
      <section class="panel">
        <h2>Neue Sidequest anlegen</h2>

        <form id="questForm" class="quest-form">
          <label for="title">Titel</label>
          <input id="title" name="title" type="text" placeholder="z. B. Bring mir einen Kaffee" required />

          <label for="assignee">Für wen?</label>
          <input id="assignee" name="assignee" type="text" placeholder="z. B. Alex" required />

          <label for="dueDate">Fällig am</label>
          <input id="dueDate" name="dueDate" type="date" required />

          <label for="description">Beschreibung</label>
          <textarea id="description" name="description" rows="4" placeholder="Kurze Questbeschreibung..."></textarea>

          <button type="submit" class="primary-btn">Sidequest hinzufügen</button>
        </form>
      </section>

      <section class="panel">
        <h2>Statusübersicht</h2>

        <div class="stats-grid">
          <div class="stat-box">
            <span>Offen</span>
            <strong id="requestedCount">0</strong>
          </div>

          <div class="stat-box">
            <span>Angenommen</span>
            <strong id="acceptedCount">0</strong>
          </div>

          <div class="stat-box">
            <span>Absolviert</span>
            <strong id="completedCount">0</strong>
          </div>

          <div class="stat-box">
            <span>Abgelehnt</span>
            <strong id="rejectedCount">0</strong>
          </div>
        </div>
      </section>
    </section>

    <section class="panel">
      <h2>Angefragte Sidequests</h2>
      <div id="requestedList" class="quest-list"></div>
    </section>

    <section class="bottom-grid">
      <section class="panel">
        <h2>Angenommen</h2>
        <div id="acceptedList" class="quest-list"></div>
      </section>

      <section class="panel">
        <h2>Absolviert</h2>
        <div id="completedList" class="quest-list"></div>
      </section>
    </section>

    <section class="panel">
      <h2>Abgelehnt</h2>
      <div id="rejectedList" class="quest-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
